<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타자 교실 v3.1 - 스마트 배치</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --accent: #e94560;
    --accent2: #0f3460;
    --gold: #f0a500;
    --silver: #888;
    --bronze: #cd7f32;
    --text: #1a1a2e;
    --text2: #6b7280;
    --radius: 16px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(233,69,96,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(15,52,96,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── SCREENS ── */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── LOBBY ── */
  #screen-lobby {
    min-height: 100vh; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .lobby-card {
    background: var(--surface);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    width: 100%; max-width: 440px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  }
  .lobby-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 2.2rem; font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
    margin-bottom: 0.4rem;
  }
  .lobby-sub { color: var(--text2); font-size: 0.9rem; margin-bottom: 2rem; }
  .role-btns { display: flex; gap: 12px; margin-bottom: 1.5rem; }
  .role-btn {
    flex: 1; padding: 0.9rem;
    border-radius: var(--radius-sm);
    border: 1.5px solid rgba(0,0,0,0.1);
    background: transparent; color: var(--text2);
    cursor: pointer; font-size: 0.95rem; font-family: inherit;
    transition: all .2s;
  }
  .role-btn.selected, .role-btn:hover {
    border-color: var(--accent); color: var(--accent);
    background: rgba(233,69,96,0.08);
  }
  .input-field {
    width: 100%; padding: 0.85rem 1rem;
    background: #f7f8fa;
    border: 1.5px solid rgba(0,0,0,0.1);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 1rem; font-family: inherit;
    outline: none; transition: border .2s;
    margin-bottom: 1rem;
  }
  .input-field:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 0.9rem;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 1rem; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: all .2s;
    letter-spacing: 0.5px;
  }
  .btn-primary:hover { background: #c73652; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── TEACHER SCREEN ── */
  #screen-teacher {
    min-height: 100vh; padding: 1.5rem;
    gap: 1.5rem;
  }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .top-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 1.4rem; font-weight: 700; color: var(--accent);
  }
  .badge {
    background: rgba(233,69,96,0.15); border: 1px solid var(--accent);
    color: var(--accent); padding: 4px 14px; border-radius: 99px; font-size: 0.78rem;
  }
  .panel {
    background: var(--surface); border: 1px solid rgba(0,0,0,0.07);
    border-radius: var(--radius); padding: 1.5rem;
  }
  .panel-title {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text2); text-transform: uppercase; margin-bottom: 1rem;
  }
  .question-type-btns { display: flex; gap: 10px; margin-bottom: 1rem; }
  .qtype-btn {
    flex: 1; padding: 0.7rem;
    border-radius: var(--radius-sm);
    border: 1.5px solid rgba(0,0,0,0.1);
    background: transparent; color: var(--text2);
    cursor: pointer; font-size: 0.88rem; font-family: inherit;
    transition: all .2s;
  }
  .qtype-btn.selected {
    border-color: var(--accent); color: var(--accent);
    background: rgba(233,69,96,0.08);
  }
  textarea.input-field { height: 80px; resize: vertical; }
  .btn-secondary {
    padding: 0.7rem 1.4rem;
    background: transparent;
    border: 1.5px solid rgba(0,0,0,0.12);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 0.88rem; font-family: inherit;
    cursor: pointer; transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* STUDENTS LIST */
  .students-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .student-chip {
    padding: 5px 14px; border-radius: 99px;
    background: #f0f2f5;
    border: 1px solid rgba(0,0,0,0.08);
    font-size: 0.82rem; color: var(--text2);
    transition: all .3s;
  }
  .student-chip.done {
    background: rgba(233,69,96,0.08);
    border-color: var(--accent); color: var(--accent);
  }

  /* RESULT / RANKING */
  #screen-result {
    min-height: 100vh; padding: 2rem;
    align-items: center; justify-content: flex-start; flex-direction: column;
    gap: 2rem;
  }
  .podium {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 16px; width: 100%; max-width: 600px;
  }
  .podium-item {
    flex: 1; text-align: center;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px;
  }
  .podium-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    border: 3px solid;
  }
  .podium-block {
    width: 100%; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 1.8rem; font-weight: 700; color: rgba(0,0,0,0.4);
  }
  .podium-name { font-size: 0.9rem; font-weight: 700; }
  .podium-time { font-size: 0.78rem; color: var(--text2); }

  .rank-list { width: 100%; max-width: 560px; }
  .rank-item {
    display: flex; align-items: center; gap: 14px;
    padding: 0.85rem 1.2rem;
    background: var(--surface);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    animation: slideIn .3s ease both;
  }
  @keyframes slideIn {
    from { transform: translateX(-20px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }
  .rank-num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
    background: #f0f2f5; color: var(--text2);
    flex-shrink: 0;
  }
  .rank-num.r1 { background: #f0a500; color: #fff; }
  .rank-num.r2 { background: #9ca3af; color: #fff; }
  .rank-num.r3 { background: #cd7f32; color: #fff; }
  .rank-name { flex: 1; font-weight: 500; }
  .rank-time { font-size: 0.82rem; color: var(--text2); }
  .rank-score { font-size: 0.78rem; color: var(--accent); }

  /* STUDENT SCREEN */
  #screen-student {
    min-height: 100vh; padding: 2rem;
    align-items: center; justify-content: center;
  }
  .student-card {
    width: 100%; max-width: 560px;
    background: var(--surface);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 24px;
    padding: 2.5rem;
    display: flex; flex-direction: column; gap: 1.2rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .prompt-box {
    background: rgba(233,69,96,0.07);
    border: 1.5px solid rgba(233,69,96,0.25);
    border-radius: var(--radius-sm);
    padding: 1.2rem 1.4rem;
    font-size: 1.15rem; line-height: 1.7;
    color: var(--text); min-height: 64px;
  }
  .typing-input {
    width: 100%; padding: 1rem 1.2rem;
    background: #f7f8fa;
    border: 2px solid rgba(0,0,0,0.1);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 1.05rem; font-family: inherit;
    outline: none; transition: border .2s;
    resize: none; height: 80px;
  }
  .typing-input:focus { border-color: var(--accent); }
  .typing-input.error { border-color: #ff6b6b; background: rgba(255,107,107,0.06); }
  .typing-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .status-bar {
    display: flex; align-items: center; gap: 1rem;
    flex-wrap: wrap;
  }
  .timer {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 1.8rem; font-weight: 700; color: var(--accent);
    min-width: 80px;
  }
  .wpm-badge {
    padding: 4px 14px; border-radius: 99px;
    background: #f0f2f5;
    font-size: 0.82rem; color: var(--text2);
  }
  .waiting-msg {
    text-align: center; color: var(--text2); font-size: 0.95rem;
    padding: 2rem;
  }
  .waiting-dot {
    display: inline-block; animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* FINAL RESULT */
  #screen-final {
    min-height: 100vh; padding: 2rem;
    align-items: center; flex-direction: column; gap: 2rem;
  }
  .final-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 2rem; font-weight: 700; text-align: center;
    color: #f0a500;
  }
  .game-history { width: 100%; max-width: 600px; }
  .history-item {
    background: var(--surface);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: var(--radius-sm);
    padding: 0.8rem 1.2rem;
    margin-bottom: 8px;
    font-size: 0.88rem; color: var(--text2);
  }
  .history-item strong { color: var(--text); }

  /* ── LIVE BUBBLE SCREEN ── */
  #screen-live {
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  .live-header {
    position: relative; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 1.5rem;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.07);
    flex-wrap: wrap; gap: 0.8rem;
  }
  .live-question-box {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    text-align: center;
    padding: 2rem 3rem;
    max-width: 700px; width: 90%;
    pointer-events: none;
    /* 영역 확인을 위한 투명 배경 */
    background: rgba(255,255,255,0.4);
    border-radius: 30px;
  }
  .live-question-label {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 2px;
    color: var(--text2); text-transform: uppercase; margin-bottom: 1rem;
  }
  .live-question-text {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: clamp(1.6rem, 4vw, 3rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
  }
  .float-bubble {
    position: absolute;
    padding: 12px 18px;
    border-radius: 20px 20px 20px 4px;
    border: 1.5px solid;
    max-width: 240px;
    min-width: 140px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    z-index: 10;
    animation: floatIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
    transition: transform 0.2s;
  }
  @keyframes floatIn {
    from { transform: scale(0.4) translateY(20px); opacity: 0; }
    to   { transform: scale(1)   translateY(0);    opacity: 1; }
  }
  .bubble-name { font-size: 0.72rem; font-weight: 700; margin-bottom: 4px; opacity: 0.75; }
  .bubble-text { font-size: 0.9rem; line-height: 1.4; margin-bottom: 6px; }
  .bubble-time { font-size: 0.7rem; opacity: 0.65; }

  /* ── PASSWORD MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  /* UTIL */
  .flex-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .grow { flex: 1; }
  .hidden { display: none !important; }
  .mt { margin-top: 1rem; }
  .center { text-align: center; }
  .small { font-size: 0.82rem; color: var(--text2); }
  .btn-reset-game {
    padding: 0.7rem 1.4rem;
    background: #fff7ed; color: #ea580c;
    border: 1.5px solid #fdba74;
    border-radius: var(--radius-sm);
    font-size: 0.88rem; font-family: inherit;
    cursor: pointer; transition: all .2s; font-weight: 700;
  }
</style>
</head>
<body>

<div id="screen-lobby" class="screen active">
  <div class="lobby-card">
    <div class="lobby-title">⌨️ 타자 교실</div>
    <div class="lobby-sub">실시간 타자 연습 게임</div>
    <div class="role-btns">
      <button class="role-btn selected" id="role-student" onclick="selectRole('student')">🙋 학생</button>
      <button class="role-btn" id="role-teacher" onclick="selectRole('teacher')">👩‍🏫 선생님</button>
    </div>
    <input class="input-field" id="lobby-name" placeholder="이름을 입력하세요" maxlength="12" />
    <div id="teacher-pw-wrap" class="hidden">
      <input class="input-field" id="lobby-pw" type="password" placeholder="선생님 비밀번호 (기본: 1234)" />
    </div>
    <button class="btn-primary" id="lobby-enter-btn" onclick="enterRoom()">입장하기</button>
    <div class="small mt center" id="lobby-error"></div>
  </div>
</div>

<div id="screen-teacher" class="screen">
  <div class="top-bar">
    <div class="top-title">👩‍🏫 선생님 대시보드</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span class="badge" id="student-count-badge">학생 0명</span>
      <button class="btn-secondary" onclick="openPwModal()">🔑 비밀번호 변경</button>
      <button class="btn-secondary" onclick="showFinalResult()">🏆 최종 순위</button>
      <button class="btn-secondary" onclick="resetGame()" id="reset-btn" style="display:none">🔄 새 문제</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">접속 중인 학생</div>
    <div class="students-list" id="students-list"></div>
  </div>
  <div class="panel" id="question-panel">
    <div class="panel-title">문제 출제</div>
    <div class="question-type-btns">
      <button class="qtype-btn selected" id="qtype-copy" onclick="selectQtype('copy')">📝 따라쓰기</button>
      <button class="qtype-btn" id="qtype-answer" onclick="selectQtype('answer')">💬 답변하기</button>
    </div>
    <textarea class="input-field" id="question-text" placeholder="문제 텍스트를 입력하세요..."></textarea>
    <div class="flex-row">
      <button class="btn-primary grow" onclick="startRound()">▶ 게임 시작</button>
    </div>
  </div>
</div>

<div id="screen-live" class="screen">
  <div class="live-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="top-title">👩‍🏫 실시간 현황</div>
      <div id="all-submitted-notice-live" style="display:none;padding:4px 14px;background:rgba(22,163,74,0.1);border:1px solid #16a34a;border-radius:99px;color:#15803d;font-size:0.82rem;font-weight:700;">
        🎉 전원 제출 완료!
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span id="live-submit-count" class="live-submit-count">0명 제출</span>
      <span class="badge" id="live-student-badge">학생 0명</span>
      <button class="btn-primary" style="width:auto;padding:0.6rem 1.4rem;" onclick="showRoundResult()">📊 결과 보기</button>
    </div>
  </div>
  <div class="live-question-box" id="live-question-box">
    <div class="live-question-label" id="live-qtype-label"></div>
    <div class="live-question-text" id="live-question-text"></div>
  </div>
</div>

<div id="screen-student" class="screen">
  <div class="student-card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="font-family:'Gmarket Sans',sans-serif;font-size:1.1rem;font-weight:700;">⌨️ 타자 교실</div>
      <span class="badge" id="student-name-badge"></span>
    </div>
    <div id="student-waiting" class="waiting-msg">선생님의 문제를 기다리는 중<span class="waiting-dot">...</span></div>
    <div id="student-game" class="hidden">
      <div class="small" id="game-type-label" style="margin-bottom:0.5rem;"></div>
      <div class="prompt-box" id="student-prompt"></div>
      <div class="status-bar">
        <div class="timer" id="student-timer">0.0s</div>
        <div class="wpm-badge" id="wpm-display">-- 타/분</div>
      </div>
      <textarea class="typing-input" id="typing-input" placeholder="여기에 입력하세요..." oninput="onTypingInput()" onkeydown="onTypingKeydown(event)"></textarea>
      <div id="error-msg" class="small" style="color:#ff6b6b;min-height:18px;"></div>
      <button class="btn-primary" id="submit-btn" onclick="submitAnswer()">제출하기 ↵</button>
    </div>
    <div id="student-done" class="hidden waiting-msg">✅ 제출 완료! 다른 친구들을 기다리는 중<span class="waiting-dot">...</span></div>
    <div id="student-result" class="hidden" style="display:none;flex-direction:column;gap:1rem;">
      <div id="student-congrats" style="display:none;text-align:center;padding:1.2rem;border-radius:var(--radius);font-family:'Gmarket Sans',sans-serif;font-size:1.5rem;font-weight:700;"></div>
      <div id="my-rank-highlight" style="text-align:center;padding:1.5rem;background:#f7f8fa;border-radius:var(--radius);border:2px solid var(--accent);">
        <div id="my-rank-num" style="font-family:'Gmarket Sans',sans-serif;font-size:3rem;font-weight:700;color:var(--accent);"></div>
        <div id="my-rank-time" style="font-size:1rem;color:var(--text2);margin-top:0.2rem;"></div>
      </div>
      <div id="student-rank-list"></div>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div style="font-family:'Gmarket Sans',sans-serif;font-size:1.8rem;font-weight:700;text-align:center;margin-top:2rem;">🏅 라운드 결과</div>
  <div class="podium" id="podium"></div>
  <div class="rank-list" id="rank-list"></div>
  <div class="flex-row" style="justify-content:center;gap:12px;margin-bottom:2rem;">
    <button class="btn-primary" id="next-round-btn" onclick="nextRound()" style="display:none">다음 문제 ▶</button>
  </div>
</div>

<div id="screen-final" class="screen">
  <div class="final-title" style="margin-top:2rem;">🏆 최종 순위</div>
  <div class="podium" id="final-podium"></div>
  <div class="rank-list" id="final-rank-list"></div>
  <div class="flex-row" style="justify-content:center;margin-bottom:2rem;">
    <button class="btn-reset-game" id="full-reset-btn" onclick="fullResetGame()" style="display:none">🗑️ 전체 초기화 & 새 게임</button>
  </div>
</div>

<div class="modal-overlay" id="pw-modal">
  <div class="modal-card">
    <div class="modal-title">🔑 비밀번호 변경</div>
    <input class="input-field" id="pw-current" type="password" placeholder="현재 비밀번호" />
    <input class="input-field" id="pw-new" type="password" placeholder="새 비밀번호" />
    <input class="input-field" id="pw-confirm" type="password" placeholder="비밀번호 확인" />
    <div id="pw-error" class="small" style="color:#ff6b6b;"></div>
    <div class="modal-btns flex-row">
      <button class="btn-secondary grow" onclick="closePwModal()">취소</button>
      <button class="btn-primary grow" onclick="changePassword()">변경</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, update, remove }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9HyOo0oiBlY73nfBrv0kBJO2hyyzpicg",
  authDomain: "classroom-typing.firebaseapp.com",
  databaseURL: "https://classroom-typing-default-rtdb.firebaseio.com",
  projectId: "classroom-typing",
  storageBucket: "classroom-typing.firebasestorage.app",
  messagingSenderId: "188633279345",
  appId: "1:188633279345:web:327c0e8919ce0d26aa64d0",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── STATE ──
let myRole = 'student';
let myName = '';
let myId = '';
let currentQtype = 'copy';
let startTime = null;
let roundActive = false;
let placedRects = []; // 말풍선 위치 저장 (충돌 방지용)

const BUBBLE_COLORS = [
  { bg: 'rgba(233,69,96,0.1)', border: '#e94560', text: '#c0283e' },
  { bg: 'rgba(37,99,235,0.1)', border: '#2563eb', text: '#1d4ed8' },
  { bg: 'rgba(22,163,74,0.1)', border: '#16a34a', text: '#15803d' },
  { bg: 'rgba(234,88,12,0.1)', border: '#ea580c', text: '#c2410c' },
  { bg: 'rgba(124,58,237,0.1)', border: '#7c3aed', text: '#6d28d9' }
];
function getColor(idx) { return BUBBLE_COLORS[idx % BUBBLE_COLORS.length]; }

// ── HELPERS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
function fmtTime(ms) { return (ms/1000).toFixed(2) + 's'; }
function calcWPM(text, ms) {
  const words = text.length / 5;
  const mins = ms / 60000;
  return mins > 0 ? Math.round(words / mins) : 0;
}

// ── ROLE & QTYPE ──
window.selectRole = function(role) {
  myRole = role;
  document.getElementById('role-student').classList.toggle('selected', role === 'student');
  document.getElementById('role-teacher').classList.toggle('selected', role === 'teacher');
  document.getElementById('teacher-pw-wrap').classList.toggle('hidden', role !== 'teacher');
};
window.selectQtype = function(qt) {
  currentQtype = qt;
  document.getElementById('qtype-copy').classList.toggle('selected', qt === 'copy');
  document.getElementById('qtype-answer').classList.toggle('selected', qt === 'answer');
};

// ── ENTER ROOM ──
window.enterRoom = async function() {
  const name = document.getElementById('lobby-name').value.trim();
  if (!name) return;
  if (myRole === 'teacher') {
    const pw = document.getElementById('lobby-pw').value || '1234';
    const snap = await get(ref(db, 'room/teacherPassword'));
    if (pw !== (snap.val() || '1234')) { alert('비밀번호 오류'); return; }
    myName = name; myId = 'teacher';
    await set(ref(db, 'room/round'), { state: 'idle' });
    showScreen('teacher');
    listenAsTeacher();
  } else {
    myName = name;
    myId = 'student_' + Date.now();
    await set(ref(db, 'room/students/' + myId), { name, online: true, done: false });
    showScreen('student');
    document.getElementById('student-name-badge').textContent = name;
    listenAsStudent();
  }
};

// ── TEACHER LISTENERS (수정 핵심 로직) ──
function listenAsTeacher() {
  onValue(ref(db, 'room/students'), snap => {
    const students = snap.val() || {};
    const list = document.getElementById('students-list');
    list.innerHTML = '';
    let count = 0, doneCount = 0;
    Object.entries(students).forEach(([id, s]) => {
      count++; if (s.done) doneCount++;
      const chip = document.createElement('div');
      chip.className = 'student-chip' + (s.done ? ' done' : '');
      chip.textContent = (s.done ? '✓ ' : '') + s.name;
      list.appendChild(chip);
    });
    document.getElementById('student-count-badge').textContent = '학생 ' + count + '명';
    document.getElementById('live-student-badge').textContent = '학생 ' + count + '명';
    const notice = document.getElementById('all-submitted-notice-live');
    if (notice) notice.style.display = (count > 0 && doneCount === count) ? 'block' : 'none';
  });

  // 제출 시 말풍선 생성 (겹침 방지 적용)
  onValue(ref(db, 'room/submissions'), snap => {
    const subs = snap.val() || {};
    const entries = Object.entries(subs);
    const liveScreen = document.getElementById('screen-live');
    document.getElementById('live-submit-count').textContent = entries.length + '명 제출';

    const screenW = window.innerWidth;
    const screenH = window.innerHeight;
    const bw = 240, bh = 110; // 말풍선 고정 크기
    const margin = 20;

    // 중앙 금지 구역 (문제 박스 보호)
    const protectW = 750, protectH = 300;
    const pX1 = (screenW - protectW) / 2, pX2 = pX1 + protectW;
    const pY1 = (screenH - protectH) / 2, pY2 = pY1 + protectH;

    entries.forEach(([uid, sub], i) => {
      let div = document.getElementById('bubble-' + uid);
      if (!div) {
        div = document.createElement('div');
        div.id = 'bubble-' + uid;
        div.className = 'float-bubble';
        const c = getColor(i);
        div.style.background = c.bg;
        div.style.borderColor = c.border;
        div.style.color = c.text;

        let rx, ry, attempts = 0;
        let isOverlapping = true;

        while (isOverlapping && attempts < 100) {
          rx = margin + Math.random() * (screenW - bw - margin * 2);
          ry = 100 + margin + Math.random() * (screenH - bh - 100 - margin * 2);

          const newR = { x1: rx, y1: ry, x2: rx + bw, y2: ry + bh };
          const overlapCenter = !(newR.x2 < pX1 || newR.x1 > pX2 || newR.y2 < pY1 || newR.y1 > pY2);
          const overlapOthers = placedRects.some(r => !(newR.x2 < r.x1 || newR.x1 > r.x2 || newR.y2 < r.y1 || newR.y1 > r.y2));

          if (!overlapCenter && !overlapOthers) isOverlapping = false;
          attempts++;
        }

        div.style.left = rx + 'px';
        div.style.top = ry + 'px';
        div.innerHTML = `<div class="bubble-name">${sub.name}</div><div class="bubble-text">${sub.answer}</div><div class="bubble-time">${fmtTime(sub.elapsed)}</div>`;
        liveScreen.appendChild(div);
        placedRects.push({ x1: rx, y1: ry, x2: rx + bw, y2: ry + bh });
      }
    });
  });

  onValue(ref(db, 'room/round'), snap => {
    const round = snap.val();
    if (round?.state === 'active') {
      document.getElementById('live-qtype-label').textContent = round.qtype === 'copy' ? '📝 따라쓰기' : '💬 답변하기';
      document.getElementById('live-question-text').textContent = round.question;
      placedRects = []; // 새 라운드 시 위치 초기화
      showScreen('live');
    } else if (round?.state === 'idle') {
      document.querySelectorAll('.float-bubble').forEach(b => b.remove());
      showScreen('teacher');
    }
  });
}

// ── ROUND MANAGEMENT ──
window.startRound = async function() {
  const q = document.getElementById('question-text').value.trim();
  if (!q) return;
  await remove(ref(db, 'room/submissions'));
  await remove(ref(db, 'room/roundResult'));
  const sSnap = await get(ref(db, 'room/students'));
  const ups = {};
  if (sSnap.val()) Object.keys(sSnap.val()).forEach(id => ups[`room/students/${id}/done`] = false);
  await update(ref(db), ups);
  await set(ref(db, 'room/round'), { question: q, qtype: currentQtype, state: 'active', startedAt: Date.now() });
};

window.showRoundResult = async function() {
  const snap = await get(ref(db, 'room/submissions'));
  const subs = snap.val() || {};
  const entries = Object.values(subs).sort((a,b) => a.elapsed - b.elapsed);
  await set(ref(db, 'room/roundResult'), { entries, publishedAt: Date.now() });
  renderResultList(entries);
  showScreen('result');
  document.getElementById('next-round-btn').style.display = 'block';
};

function renderResultList(entries) {
  const list = document.getElementById('rank-list');
  list.innerHTML = '';
  entries.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 'rank-item';
    item.innerHTML = `<div class="rank-num">${i+1}</div><div class="rank-name">${e.name}</div><div class="rank-time">${fmtTime(e.elapsed)}</div>`;
    list.appendChild(item);
  });
}

window.nextRound = async function() {
  await set(ref(db, 'room/round'), { state: 'idle' });
  document.getElementById('question-text').value = '';
};

// ── STUDENT LISTENERS ──
function listenAsStudent() {
  onValue(ref(db, 'room/round'), snap => {
    const r = snap.val();
    if (r?.state === 'active' && !roundActive) {
      roundActive = true;
      startTime = Date.now();
      document.getElementById('student-waiting').classList.add('hidden');
      document.getElementById('student-game').classList.remove('hidden');
      document.getElementById('student-prompt').textContent = r.question;
      document.getElementById('typing-input').value = '';
      document.getElementById('typing-input').disabled = false;
    } else if (r?.state === 'idle') {
      roundActive = false;
      document.getElementById('student-waiting').classList.remove('hidden');
      document.getElementById('student-game').classList.add('hidden');
      document.getElementById('student-done').classList.add('hidden');
      document.getElementById('student-result').style.display = 'none';
    }
  });
  onValue(ref(db, 'room/roundResult'), snap => {
    const res = snap.val();
    if (res) showStudentRank(res.entries);
  });
}

function showStudentRank(entries) {
  const myIdx = entries.findIndex(e => e.uid === myId);
  if (myIdx === -1) return;
  document.getElementById('student-game').classList.add('hidden');
  document.getElementById('student-done').classList.add('hidden');
  const resDiv = document.getElementById('student-result');
  resDiv.style.display = 'flex';
  document.getElementById('my-rank-num').textContent = (myIdx + 1) + '등';
  document.getElementById('my-rank-time').textContent = fmtTime(entries[myIdx].elapsed);
}

window.submitAnswer = async function() {
  const ans = document.getElementById('typing-input').value.trim();
  if (!ans) return;
  const elapsed = Date.now() - startTime;
  await set(ref(db, 'room/submissions/' + myId), { uid: myId, name: myName, answer: ans, elapsed });
  await update(ref(db, 'room/students/' + myId), { done: true });
  document.getElementById('student-game').classList.add('hidden');
  document.getElementById('student-done').classList.remove('hidden');
};

window.onTypingInput = () => {};
window.onTypingKeydown = (e) => { if (e.key === 'Enter') submitAnswer(); };

// ── INITIALIZE ──
window.resetGame = nextRound;
</script>
</body>
</html>
